name: Deploy to GitHub Pages

# Construye el sitio estático (Vite) y lo publica en GitHub Pages usando el
# modelo de deploy "desde Actions" (no la rama gh-pages legacy).
# Se dispara solo en push a main: el merge de un PR a main publica producción.

on:
  push:
    branches: [main]
  # Permite relanzar un deploy manualmente sin un nuevo commit.
  workflow_dispatch:

# Permisos mínimos que requieren las actions oficiales de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez. No cancelamos un deploy en curso para no
# dejar Pages en un estado intermedio.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite genera el sitio estático en dist/.
          # Solo se publica dist/: los archivos privados (.claude/, CLAUDE.md,
          # .github/, docs/, CHANGELOG.md) nunca entran en el artefacto.
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
